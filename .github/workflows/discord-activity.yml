name: Repo Activity to Discord

on:
  push:
    branches:
      - "**"
    tags:
      - "**"
  pull_request:
    types:
      [
        opened,
        reopened,
        synchronize,
        closed,
        ready_for_review,
        review_requested,
      ]
  create:
  delete:
  release:
    types: [published, prereleased, released]
  issues:
    types: [opened, edited, closed, reopened]
  discussion:
    types: [created, edited]
  discussion_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read
  issues: read
  discussions: read

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build Discord payload
        shell: bash
        run: |
          EVENT="${{ github.event_name }}"
          ACTION="${{ github.event.action }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          URL="$REPO_URL"
          COLOR=3447003
          TITLE="$EVENT"

          FIELD1_NAME="Repository"
          FIELD1_VALUE="$REPO"
          FIELD1_INLINE=true

          FIELD2_NAME="Actor"
          FIELD2_VALUE="$ACTOR"
          FIELD2_INLINE=true

          FIELD3_NAME="Action"
          FIELD3_VALUE="${ACTION:-push}"
          FIELD3_INLINE=true

          FIELD4_NAME=""
          FIELD4_VALUE=""
          FIELD4_INLINE=false

          if [ "$EVENT" = "push" ]; then
            REF_NAME="${{ github.ref_name }}"
            COMPARE_URL="${{ github.event.compare }}"
            URL="$COMPARE_URL"
            TITLE="Push to ${REF_NAME}"

            COMMIT_COUNT=$(jq '.commits | length' "$GITHUB_EVENT_PATH")

            COMMIT_LINES=$(jq -r '
              .commits[:10]
              | map("- `" + (.id[0:7]) + "` " + ((.message | split("\n")[0]) // "") + " — **" + .author.name + "**")
              | join("\n")
            ' "$GITHUB_EVENT_PATH")

            if [ -z "$COMMIT_LINES" ] || [ "$COMMIT_LINES" = "null" ]; then
              COMMIT_LINES="No commit details provided."
            fi

            FIELD1_NAME="Repository"
            FIELD1_VALUE="$REPO"
            FIELD1_INLINE=true

            FIELD2_NAME="Branch/Tag"
            FIELD2_VALUE="$REF_NAME"
            FIELD2_INLINE=true

            FIELD3_NAME="Actor"
            FIELD3_VALUE="$ACTOR"
            FIELD3_INLINE=true

            FIELD4_NAME="Commits (${COMMIT_COUNT})"
            FIELD4_VALUE="$COMMIT_LINES"
            FIELD4_INLINE=false

          elif [ "$EVENT" = "pull_request" ]; then
            PR_TITLE=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
            PR_URL=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")
            PR_NUM=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
            MERGED=$(jq -r '.pull_request.merged' "$GITHUB_EVENT_PATH")
            BASE=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
            HEAD=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
            URL="$PR_URL"

            if [ "$ACTION" = "closed" ] && [ "$MERGED" = "true" ]; then
              TITLE="PR merged: #${PR_NUM}"
              COLOR=5763719
              FIELD3_NAME="Merged by"
              FIELD3_VALUE="$ACTOR"
            else
              TITLE="PR ${ACTION}: #${PR_NUM}"
              FIELD3_NAME="Actor"
              FIELD3_VALUE="$ACTOR"
            fi

            FIELD1_NAME="Title"
            FIELD1_VALUE="$PR_TITLE"
            FIELD1_INLINE=false

            FIELD2_NAME="Source → Target"
            FIELD2_VALUE="${HEAD} → ${BASE}"
            FIELD2_INLINE=true

            FIELD3_INLINE=true

            FIELD4_NAME="Repository"
            FIELD4_VALUE="$REPO"
            FIELD4_INLINE=true

          elif [ "$EVENT" = "create" ]; then
            REF_TYPE=$(jq -r '.ref_type' "$GITHUB_EVENT_PATH")
            REF=$(jq -r '.ref' "$GITHUB_EVENT_PATH")
            TITLE="Created ${REF_TYPE}: ${REF}"

            FIELD1_NAME="Repository"
            FIELD1_VALUE="$REPO"
            FIELD1_INLINE=true

            FIELD2_NAME="Type"
            FIELD2_VALUE="$REF_TYPE"
            FIELD2_INLINE=true

            FIELD3_NAME="Name"
            FIELD3_VALUE="$REF"
            FIELD3_INLINE=true

            FIELD4_NAME="Actor"
            FIELD4_VALUE="$ACTOR"
            FIELD4_INLINE=true

          elif [ "$EVENT" = "delete" ]; then
            REF_TYPE=$(jq -r '.ref_type' "$GITHUB_EVENT_PATH")
            REF=$(jq -r '.ref' "$GITHUB_EVENT_PATH")
            TITLE="Deleted ${REF_TYPE}: ${REF}"
            COLOR=15158332

            FIELD1_NAME="Repository"
            FIELD1_VALUE="$REPO"
            FIELD1_INLINE=true

            FIELD2_NAME="Type"
            FIELD2_VALUE="$REF_TYPE"
            FIELD2_INLINE=true

            FIELD3_NAME="Name"
            FIELD3_VALUE="$REF"
            FIELD3_INLINE=true

            FIELD4_NAME="Actor"
            FIELD4_VALUE="$ACTOR"
            FIELD4_INLINE=true

          elif [ "$EVENT" = "release" ]; then
            TAG=$(jq -r '.release.tag_name' "$GITHUB_EVENT_PATH")
            NAME=$(jq -r '.release.name // .release.tag_name' "$GITHUB_EVENT_PATH")
            REL_URL=$(jq -r '.release.html_url' "$GITHUB_EVENT_PATH")
            URL="$REL_URL"
            TITLE="Release ${ACTION}: ${TAG}"
            COLOR=10181046

            FIELD1_NAME="Release"
            FIELD1_VALUE="$NAME"
            FIELD1_INLINE=false

            FIELD2_NAME="Tag"
            FIELD2_VALUE="$TAG"
            FIELD2_INLINE=true

            FIELD3_NAME="Actor"
            FIELD3_VALUE="$ACTOR"
            FIELD3_INLINE=true

            FIELD4_NAME="Repository"
            FIELD4_VALUE="$REPO"
            FIELD4_INLINE=true

          elif [ "$EVENT" = "issues" ]; then
            NUM=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
            ITITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
            IURL=$(jq -r '.issue.html_url' "$GITHUB_EVENT_PATH")
            URL="$IURL"
            TITLE="Issue ${ACTION}: #${NUM}"

            FIELD1_NAME="Title"
            FIELD1_VALUE="$ITITLE"
            FIELD1_INLINE=false

            FIELD2_NAME="Number"
            FIELD2_VALUE="#${NUM}"
            FIELD2_INLINE=true

            FIELD3_NAME="Actor"
            FIELD3_VALUE="$ACTOR"
            FIELD3_INLINE=true

            FIELD4_NAME="Repository"
            FIELD4_VALUE="$REPO"
            FIELD4_INLINE=true

          elif [ "$EVENT" = "discussion" ]; then
            DTITLE=$(jq -r '.discussion.title' "$GITHUB_EVENT_PATH")
            DURL=$(jq -r '.discussion.html_url' "$GITHUB_EVENT_PATH")
            URL="$DURL"
            TITLE="Discussion ${ACTION}"

            FIELD1_NAME="Title"
            FIELD1_VALUE="$DTITLE"
            FIELD1_INLINE=false

            FIELD2_NAME="Actor"
            FIELD2_VALUE="$ACTOR"
            FIELD2_INLINE=true

            FIELD3_NAME="Repository"
            FIELD3_VALUE="$REPO"
            FIELD3_INLINE=true

            FIELD4_NAME=""
            FIELD4_VALUE=""
            FIELD4_INLINE=false

          elif [ "$EVENT" = "discussion_comment" ]; then
            DURL=$(jq -r '.comment.html_url' "$GITHUB_EVENT_PATH")
            URL="$DURL"
            TITLE="Discussion comment ${ACTION}"

            FIELD1_NAME="Repository"
            FIELD1_VALUE="$REPO"
            FIELD1_INLINE=true

            FIELD2_NAME="Actor"
            FIELD2_VALUE="$ACTOR"
            FIELD2_INLINE=true

            FIELD3_NAME="Action"
            FIELD3_VALUE="$ACTION"
            FIELD3_INLINE=true

            FIELD4_NAME=""
            FIELD4_VALUE=""
            FIELD4_INLINE=false
          fi

          jq -n \
            --arg username "GitHub • edgar-sec" \
            --arg title "$TITLE" \
            --arg url "$URL" \
            --arg f1n "$FIELD1_NAME" \
            --arg f1v "$FIELD1_VALUE" \
            --argjson f1i "$FIELD1_INLINE" \
            --arg f2n "$FIELD2_NAME" \
            --arg f2v "$FIELD2_VALUE" \
            --argjson f2i "$FIELD2_INLINE" \
            --arg f3n "$FIELD3_NAME" \
            --arg f3v "$FIELD3_VALUE" \
            --argjson f3i "$FIELD3_INLINE" \
            --arg f4n "$FIELD4_NAME" \
            --arg f4v "$FIELD4_VALUE" \
            --argjson f4i "$FIELD4_INLINE" \
            --argjson color "$COLOR" \
            '{
              username: $username,
              embeds: [
                {
                  title: $title,
                  url: $url,
                  color: $color,
                  fields: (
                    [
                      {name: $f1n, value: $f1v, inline: $f1i},
                      {name: $f2n, value: $f2v, inline: $f2i},
                      {name: $f3n, value: $f3v, inline: $f3i},
                      {name: $f4n, value: $f4v, inline: $f4i}
                    ]
                    | map(select(.name != "" and .value != ""))
                  )
                }
              ]
            }' > discord_payload.json

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -fsSL \
            -H "Content-Type: application/json" \
            -d @discord_payload.json \
            "$DISCORD_WEBHOOK_URL"
