name: Workflow Status to Discord

on:
  workflow_run:
    workflows: ["*"]
    types: [requested, completed]

permissions:
  actions: read
  contents: read

jobs:
  notify:
    if: ${{ github.event.workflow_run.name != 'Workflow Status to Discord' }}
    runs-on: ubuntu-latest

    steps:
      - name: Build Discord payload
        shell: bash
        run: |
          NAME=$(jq -r '.workflow_run.name' "$GITHUB_EVENT_PATH")
          HTML_URL=$(jq -r '.workflow_run.html_url' "$GITHUB_EVENT_PATH")
          CONCLUSION=$(jq -r '.workflow_run.conclusion // empty' "$GITHUB_EVENT_PATH")
          STATUS=$(jq -r '.workflow_run.status' "$GITHUB_EVENT_PATH")
          EVENT=$(jq -r '.workflow_run.event // "unknown"' "$GITHUB_EVENT_PATH")
          BRANCH=$(jq -r '.workflow_run.head_branch // "unknown"' "$GITHUB_EVENT_PATH")
          ACTOR=$(jq -r '.workflow_run.actor.login // .sender.login // "unknown"' "$GITHUB_EVENT_PATH")

          if [ "$EVENT" = "dynamic" ]; then
            EVENT="internal"
          fi

          COLOR=3447003
          TITLE="Workflow requested"

          if [ "$STATUS" = "completed" ]; then
            TITLE="Workflow completed: ${CONCLUSION}"

            if [ "$CONCLUSION" = "success" ]; then
              COLOR=5763719
            elif [ "$CONCLUSION" = "failure" ]; then
              COLOR=15548997
            elif [ "$CONCLUSION" = "cancelled" ]; then
              COLOR=9807270
            else
              COLOR=16776960
            fi
          fi

          jq -n \
            --arg username "GitHub Actions • edgar-sec" \
            --arg title "$TITLE" \
            --arg name "$NAME" \
            --arg event "$EVENT" \
            --arg branch "$BRANCH" \
            --arg actor "$ACTOR" \
            --arg url "$HTML_URL" \
            --argjson color "$COLOR" \
            '{
              username: $username,
              embeds: [
                {
                  title: $title,
                  url: $url,
                  color: $color,
                  fields: [
                    {
                      name: "Workflow",
                      value: $name,
                      inline: false
                    },
                    {
                      name: "Event",
                      value: $event,
                      inline: true
                    },
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Actor",
                      value: $actor,
                      inline: true
                    }
                  ]
                }
              ]
            }' > discord_payload.json

      - name: Send to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -fsSL \
            -H "Content-Type: application/json" \
            -d @discord_payload.json \
            "$DISCORD_WEBHOOK_URL"
